name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Smoke test (example deck → 16 PDF pages)
        run: |
          python html_to_pdf.py examples/slides/mobile-ai-runtime.html -o /tmp/smoke.pdf --delay-ms 500
          python -c "from pypdf import PdfReader; r=PdfReader('/tmp/smoke.pdf'); assert len(r.pages)==16, len(r.pages)"
